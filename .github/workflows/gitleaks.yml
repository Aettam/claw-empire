name: Secret Scan (gitleaks)

# Scans the code for accidentally-committed secrets (API keys, passwords, tokens).
# INFORMATIONAL (continue-on-error): it reports findings in the run log with the
# actual values REDACTED, and never blocks a push. If it flags something real,
# rotate that key and remove it from the code. Scans the current files only
# (not full git history), so it's fast and low-noise.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks (informational secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Scan working tree for secrets
        continue-on-error: true
        run: gitleaks dir . --redact --no-banner --verbose
