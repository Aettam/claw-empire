<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a18" />
    <meta
      name="description"
      content="Manage AI agents, assign tasks, and watch your company collaborate in real-time. An immersive agent company simulator."
    />
    <meta property="og:title" content="Claw-Empire — AI Agent Company Simulation" />
    <meta
      property="og:description"
      content="Manage AI agents, assign tasks, and watch your company collaborate in real-time."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/claw-empire.png" />
    <title>Claw-Empire - AI Agent Company Simulation</title>
    <link rel="icon" type="image/svg+xml" href="/claw-empire.svg" />
    <link rel="apple-touch-icon" href="/claw-empire.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@600;700;800&display=swap"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preload" as="image" href="/sprites/ceo-lobster.webp" type="image/webp" />
    <link rel="preload" as="image" href="/sprites/3-D-1.webp" type="image/webp" />
    <link rel="preload" as="image" href="/sprites/8-D-1.webp" type="image/webp" />
    <!--
      Sprite size audit (Round-3 perf pass): the formerly-oversized background
      characters (13-R-1, 14-D-1..3, 14-L-1, 14-R-1, each ~1.16 MB as PNG) now
      ship WebP variants under 60 KB/frame. All 71 sprites have a .webp sibling;
      <picture> tags and the Pixi office runtime load WebP first and fall back to
      PNG only if missing.
    -->
    <!--
      Apply the saved theme to <html> before the first paint so the loading
      splash below matches the user's chosen mode (light is the default — see
      src/ThemeContext.tsx). Mirrors the THEME_STORAGE_KEY ("climpire_theme")
      read in ThemeProvider so light-mode users no longer get a dark flash on
      reload. Tiny + synchronous so it runs before the splash renders.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem("climpire_theme");
          document.documentElement.setAttribute("data-theme", stored === "dark" ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <!--
      Pre-hydration loading splash: static markup that paints instantly (no JS
      needed) so the first frame is a branded screen instead of a black void.
      React's createRoot().render() replaces #root's children on mount, so the
      splash disappears the moment the app is ready — no JS teardown required.
      The dark-navy styles below are the default; [data-theme="light"] overrides
      repaint the splash in the app's cream light palette to match theme.css.
    -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: radial-gradient(120% 120% at 50% 0%, #14143a 0%, #0a0a18 60%);
        font-family: "Sora", "Segoe UI", system-ui, sans-serif;
        animation: app-loader-in 0.4s ease-out both;
        z-index: 1;
      }
      #app-loader .al-logo {
        width: 92px;
        height: 92px;
        border-radius: 22px;
        filter: drop-shadow(0 10px 28px rgba(245, 158, 11, 0.28));
        animation: app-loader-pulse 2s ease-in-out infinite;
      }
      #app-loader .al-wordmark {
        font-weight: 800;
        font-size: 1.6rem;
        letter-spacing: 0.04em;
        color: #f1f5f9;
        margin: 0;
      }
      #app-loader .al-wordmark .al-accent {
        background: linear-gradient(90deg, #f59e0b, #fbbf24);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      #app-loader .al-tagline {
        font-size: 0.8125rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #64748b;
        margin: -0.5rem 0 0;
      }
      #app-loader .al-dots {
        display: flex;
        gap: 0.45rem;
        margin-top: 0.35rem;
      }
      #app-loader .al-dots span {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        animation: app-loader-bounce 1.2s ease-in-out infinite;
      }
      #app-loader .al-dots span:nth-child(1) {
        background: #f59e0b;
        animation-delay: 0s;
      }
      #app-loader .al-dots span:nth-child(2) {
        background: #3b82f6;
        animation-delay: 0.18s;
      }
      #app-loader .al-dots span:nth-child(3) {
        background: #8b5cf6;
        animation-delay: 0.36s;
      }
      @keyframes app-loader-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes app-loader-pulse {
        0%,
        100% {
          transform: scale(1);
          filter: drop-shadow(0 10px 28px rgba(245, 158, 11, 0.22));
        }
        50% {
          transform: scale(1.05);
          filter: drop-shadow(0 14px 34px rgba(245, 158, 11, 0.42));
        }
      }
      @keyframes app-loader-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.45;
        }
        40% {
          transform: translateY(-7px);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader,
        #app-loader .al-logo,
        #app-loader .al-dots span {
          animation: none;
        }
        #app-loader .al-dots span {
          opacity: 0.8;
        }
      }
      /* Light-mode splash — cream palette mirroring theme.css [data-theme="light"]. */
      [data-theme="light"] #app-loader {
        background: radial-gradient(120% 120% at 50% 0%, #fffdf8 0%, #f7f3ec 60%);
      }
      [data-theme="light"] #app-loader .al-wordmark {
        color: #1a1614;
      }
      [data-theme="light"] #app-loader .al-tagline {
        color: #908880;
      }
    </style>
  </head>
  <body class="bg-slate-900 text-white">
    <div id="root">
      <div id="app-loader" role="status" aria-label="Loading Claw-Empire">
        <img class="al-logo" src="/claw-empire.svg" alt="" width="92" height="92" />
        <h1 class="al-wordmark">Claw<span class="al-accent">-Empire</span></h1>
        <p class="al-tagline">AI Agent Company</p>
        <div class="al-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
